<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUNSUNG 은성 | 세라믹·인조대리석 상판 전문 제조기업</title>
<meta name="description" content="경기도 포천 직영공장 · LX하우시스 공식 대리점 · 세라믹·MMA·이스톤·BMC 상판 맞춤제작. 상담부터 가공·납품·시공까지 원스톱.">
<meta property="og:title" content="EUNSUNG 은성 | 세라믹 상판 전문 제조기업">
<meta property="og:description" content="포천 직영공장 · LX공식대리점 · 맞춤 상판 제작">
<meta property="og:image" content="https://images.unsplash.com/photo-1600585154526-990dced4db0d?w=1200&q=80">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Sans+KR:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-family:inherit}
ul{list-style:none}

/* ─── TOKENS ────────────────────────────────────────── */
:root{
  --bg:#0A0908;
  --bg2:#151210;
  --bg3:#1E1A17;
  --white:#FFFFFF;
  --ink:#F2EDE8;
  --ink2:#A89F96;
  --ink3:#6B645E;
  --gold:#BF8E5A;
  --gold-light:#D4AA78;
  --gold-pale:rgba(191,142,90,0.08);
  --border:rgba(191,142,90,0.15);
  --border2:rgba(255,255,255,0.06);
  --nav-h:80px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Noto Sans KR',sans-serif;
  --mono:'Inter',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(0,0,.2,1);
}

/* ─── TYPOGRAPHY ────────────────────────────────────── */
.label{font-family:var(--mono);font-size:.7rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3)}
.h-serif{font-family:var(--serif);font-weight:300;line-height:1.1;letter-spacing:-.01em}
.h-sans{font-family:var(--sans);font-weight:600;letter-spacing:-.02em}

/* ─── LAYOUT ────────────────────────────────────────── */
.container{max-width:1240px;margin:0 auto;padding:0 40px}
.section{padding:100px 0}
@media(max-width:768px){.container{padding:0 24px}.section{padding:64px 0}}

/* ═══════════════════════════════════════════════════════
   NAV
══════════════════════════════════════════════════════ */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--nav-h);
  display:flex;align-items:center;
  background:transparent;
  transition:background .4s var(--ease),box-shadow .4s var(--ease);
}
#nav.scrolled{
  background:rgba(10,9,8,.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  box-shadow:0 1px 0 var(--border)
}
.nav-inner{
  width:100%;max-width:1240px;margin:0 auto;padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{display:flex;flex-direction:column;align-items:flex-start;line-height:1}
.nav-logo .en{
  font-family:var(--serif);font-size:1.45rem;font-weight:400;letter-spacing:.18em;
  color:var(--white);transition:color .4s
}
.nav-logo .kr{
  font-size:.6rem;font-weight:300;letter-spacing:.22em;margin-top:2px;
  color:rgba(255,255,255,.5);
}
.nav-links{display:flex;align-items:center;gap:36px}
.nav-links a{
  font-size:.8rem;font-weight:400;letter-spacing:.06em;
  color:rgba(255,255,255,.75);transition:color .3s;
  position:relative;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-3px;left:0;right:0;
  height:1px;background:var(--gold);transform:scaleX(0);
  transform-origin:left;transition:transform .3s var(--ease)
}
.nav-links a:hover{color:var(--white)}
.nav-links a:hover::after{transform:scaleX(1)}
.nav-cta{
  padding:9px 22px;border:1px solid var(--gold);
  font-size:.75rem;font-weight:500;letter-spacing:.08em;
  color:var(--gold);border-radius:2px;
  transition:all .3s var(--ease)
}
.nav-cta:hover{background:var(--gold);color:var(--white)}
.nav-ham{display:none;flex-direction:column;gap:5px;padding:8px;cursor:pointer}
.nav-ham span{display:block;width:24px;height:1px;background:var(--white);transition:all .3s}
@media(max-width:900px){.nav-links{display:none}.nav-ham{display:flex}}
#mobile-menu{
  position:fixed;inset:0;z-index:99;
  background:var(--bg2);display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:32px;
  opacity:0;pointer-events:none;transition:opacity .4s var(--ease)
}
#mobile-menu.open{opacity:1;pointer-events:auto}
#mobile-menu a{font-family:var(--serif);font-size:2rem;color:var(--ink);letter-spacing:.06em}
#mobile-menu .close-btn{position:absolute;top:24px;right:28px;font-size:1.5rem;color:var(--ink);background:none;border:none;cursor:pointer}

/* ═══════════════════════════════════════════════════════
   HERO SLIDER
══════════════════════════════════════════════════════ */
#hero{position:relative;height:100vh;min-height:600px;overflow:hidden}
.hero-slides{position:absolute;inset:0}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s var(--ease)}
.hero-slide.active{opacity:1}
.hero-slide img{width:100%;height:100%;object-fit:cover;object-position:center;transform-origin:center}
.hero-slide.active img{animation:kenburns 8s ease-out forwards}
@keyframes kenburns{0%{transform:scale(1.0)}100%{transform:scale(1.08)}}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to right,rgba(10,9,8,.85) 0%,rgba(10,9,8,.4) 60%,rgba(10,9,8,.1) 100%)
}
.hero-content{
  position:absolute;left:80px;bottom:120px;
  width:min(640px,45vw);
  display:flex;flex-direction:column;
}
.hero-label{
  font-family:var(--mono);font-size:.75rem;font-weight:500;
  letter-spacing:.2em;color:var(--gold);text-transform:uppercase;
  margin-bottom:20px;
}
.hero-title{
  font-family:var(--serif);font-size:clamp(3.5rem,6vw,8rem);
  font-weight:300;color:var(--white);line-height:1.0;
  letter-spacing:-.02em;margin-bottom:24px;
  word-break:keep-all;white-space:normal;width:100%;
}
.hero-title em{font-style:italic;color:var(--gold-light)}
.hero-sub{
  font-size:.9rem;font-weight:300;color:var(--ink2);
  line-height:1.7;margin-bottom:36px;letter-spacing:.02em;
  width:100%;word-break:keep-all;
}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;width:100%}
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;background:var(--gold);color:var(--white);
  font-size:.8rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  border-radius:2px;transition:background .3s,transform .2s
}
.btn-primary:hover{background:#A87A48;transform:translateY(-1px)}
.btn-outline{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;border:1px solid rgba(255,255,255,.4);
  color:var(--white);font-size:.8rem;font-weight:400;letter-spacing:.1em;text-transform:uppercase;
  border-radius:2px;transition:all .3s
}
.btn-outline:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.7)}
.hero-dots{
  position:absolute;bottom:40px;right:40px;
  display:flex;flex-direction:column;gap:8px;align-items:center
}
.hero-dot{width:1px;height:28px;background:rgba(255,255,255,.2);cursor:pointer;transition:background .3s,transform .3s}
.hero-dot.active{background:var(--gold);transform:scaleY(1.4)}
.scroll-hint{
  position:absolute;bottom:36px;left:80px;
  display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.35);
  font-family:var(--mono);font-size:.65rem;letter-spacing:.16em
}
.scroll-line{width:40px;height:1px;background:rgba(255,255,255,.25);animation:lineAnim 2s ease-in-out infinite}
@keyframes lineAnim{0%,100%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1);transform-origin:left}51%{transform-origin:right}99%{transform:scaleX(0);transform-origin:right}}
@media(max-width:768px){.hero-content{left:32px;bottom:100px;width:calc(100vw - 64px)}}
@media(max-width:480px){.hero-content{left:24px;bottom:80px;width:calc(100vw - 48px)}.hero-title{font-size:2.8rem}}

/* ═══════════════════════════════════════════════════════
   TRUST BAR
══════════════════════════════════════════════════════ */
#trust{
  background:var(--bg2);padding:28px 0;
  border-top:1px solid var(--gold);border-bottom:1px solid var(--gold);
}
.trust-grid{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:0}
.trust-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 40px;border-right:1px solid rgba(255,255,255,.08);
}
.trust-item:last-child{border-right:none}
.trust-num{font-family:var(--serif);font-size:2.5rem;font-weight:300;color:var(--gold);line-height:1}
.trust-num sup{font-size:.9rem}
.trust-text-block .t{font-size:.7rem;font-weight:500;color:var(--ink);letter-spacing:.04em}
.trust-text-block .s{font-size:.65rem;color:var(--ink3);margin-top:2px;letter-spacing:.02em}
@media(max-width:768px){
  .trust-item{padding:12px 20px;border-right:none;border-bottom:1px solid rgba(255,255,255,.06)}
  .trust-item:last-child{border-bottom:none}
  .trust-grid{flex-direction:column;width:100%}
}

/* ═══════════════════════════════════════════════════════
   ABOUT
══════════════════════════════════════════════════════ */
#about{background:var(--bg)}
.about-inner{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.about-label{margin-bottom:16px}
.about-title{
  font-family:var(--serif);font-size:clamp(2rem,3vw,3rem);
  font-weight:300;line-height:1.15;margin-bottom:28px;color:var(--ink)
}
.about-title em{font-style:italic;color:var(--gold-light)}
.about-body{font-size:.9rem;line-height:1.9;color:var(--ink2);font-weight:300;margin-bottom:32px}
.about-tags{display:flex;flex-wrap:wrap;gap:8px}
.about-tag{
  padding:6px 14px;border:1px solid var(--border);
  font-size:.7rem;letter-spacing:.06em;color:var(--ink2);
  border-radius:2px;transition:all .3s
}
.about-tag:hover{border-color:var(--gold);color:var(--gold)}
.about-img-wrap{position:relative}
.about-img-main{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:2px}
.about-img-badge{position:absolute;bottom:-20px;left:-20px;background:var(--gold);padding:20px 24px;border-radius:2px}
.about-img-badge .bn{font-family:var(--serif);font-size:1.8rem;font-weight:300;color:var(--white);line-height:1}
.about-img-badge .bs{font-size:.65rem;color:rgba(255,255,255,.75);letter-spacing:.1em;margin-top:4px}
@media(max-width:900px){
  .about-inner{grid-template-columns:1fr;gap:48px}
  .about-img-wrap{order:-1}
  .about-img-main{aspect-ratio:16/9}
}

/* ═══════════════════════════════════════════════════════
   SECTION COMMON
══════════════════════════════════════════════════════ */
.section-header{text-align:center;margin-bottom:60px}
.section-title{
  font-family:var(--serif);font-size:clamp(1.8rem,2.8vw,2.8rem);
  font-weight:300;line-height:1.2;color:var(--ink);
  margin-top:12px;
}
.section-title::after{
  content:'';display:block;width:32px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:14px auto 0;
}
.section-sub{font-size:.85rem;color:var(--ink3);line-height:1.7;max-width:480px;margin:16px auto 0;font-weight:300}

/* ═══════════════════════════════════════════════════════
   MATERIALS OVERVIEW
══════════════════════════════════════════════════════ */
#materials-overview{background:var(--bg2)}
.mat-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border2);
}
.mat-card{
  background:var(--bg3);position:relative;overflow:hidden;cursor:pointer;
  border:1px solid transparent;
  transition:all .4s var(--ease);
}
.mat-card:hover{border-color:var(--gold);transform:translateY(-6px);box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:1}
.mat-card-img{
  width:100%;height:clamp(220px,28vw,420px);max-height:420px;object-fit:cover;
  transition:transform .6s var(--ease),filter .4s
}
.mat-card:hover .mat-card-img{transform:scale(1.04);filter:brightness(.65)}
.mat-card-body{
  position:absolute;bottom:0;left:0;right:0;padding:24px 20px;
  background:linear-gradient(transparent,rgba(10,9,8,.88));
  transition:background .4s
}
.mat-card:hover .mat-card-body{background:linear-gradient(transparent,rgba(10,9,8,.97))}
.mat-badge{
  display:inline-block;padding:3px 8px;background:var(--gold);
  font-size:.6rem;font-weight:500;letter-spacing:.1em;color:var(--white);
  border-radius:1px;margin-bottom:8px
}
.mat-name{font-family:var(--serif);font-size:1.3rem;font-weight:300;color:var(--white);line-height:1.2;margin-bottom:4px}
.mat-kr{font-size:.7rem;color:rgba(255,255,255,.5);letter-spacing:.06em}
.mat-hover-info{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;opacity:0;transition:opacity .3s;pointer-events:none
}
.mat-card:hover .mat-hover-info{opacity:1}
.mat-hover-info p{font-size:.75rem;color:rgba(255,255,255,.8);line-height:1.8}
.mat-tier{display:inline-block;margin-bottom:8px;font-family:var(--mono);font-size:.65rem;letter-spacing:.14em;color:var(--gold-light)}
@media(max-width:900px){.mat-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.mat-grid{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════════════
   MATERIAL DETAIL TABS
══════════════════════════════════════════════════════ */
#materials-detail{background:var(--bg2)}
.tab-nav{
  display:flex;border-bottom:1px solid var(--border);
  gap:0;overflow-x:auto;scrollbar-width:none;margin-bottom:56px;
}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;padding:16px 32px;
  font-size:.8rem;font-weight:400;letter-spacing:.06em;
  color:var(--ink3);border-bottom:2px solid transparent;
  transition:all .3s;white-space:nowrap;
}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:hover{color:var(--ink2)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.lx-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;border:1px solid var(--border);
  border-radius:2px;margin-bottom:32px
}
.lx-badge span{font-size:.7rem;font-weight:500;letter-spacing:.08em;color:var(--gold)}
.spec-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.spec-tag{
  padding:5px 12px;background:var(--gold-pale);border:1px solid var(--border);
  font-size:.7rem;color:var(--ink2);letter-spacing:.04em;border-radius:1px
}
.mat-panel-layout{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.mat-panel-left .title{
  font-family:var(--serif);font-size:1.9rem;font-weight:300;
  color:var(--ink);margin-bottom:12px;line-height:1.2
}
.mat-panel-left .desc{font-size:.85rem;line-height:1.9;color:var(--ink2);font-weight:300;margin-bottom:24px}
.colors-title{font-size:.75rem;font-weight:500;letter-spacing:.08em;color:var(--ink3);margin-bottom:16px}
.colors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:16px}
.color-item{cursor:pointer}
.color-swatch{
  width:100%;aspect-ratio:1;object-fit:cover;border-radius:2px;margin-bottom:8px;
  transition:transform .3s,box-shadow .3s
}
.color-item:hover .color-swatch{transform:scale(1.03);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.color-name{font-size:.68rem;color:var(--ink2);line-height:1.4}
.color-code{font-size:.6rem;color:var(--ink3);margin-top:2px}
.color-sub{font-size:.65rem;color:var(--ink3);margin-top:1px;letter-spacing:.04em}
.color-item--noimg{background:var(--bg3)}
.color-placeholder{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);font-size:.65rem;color:var(--ink3);letter-spacing:.06em;margin-bottom:6px}
.mat-panel-right .feature-list{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:0}
.feature-item{
  display:flex;gap:12px;align-items:flex-start;
  background:var(--bg3);border:1px solid var(--border2);
  padding:16px;border-radius:2px;transition:all .3s
}
.feature-item:hover{transform:translateY(-2px);border-color:var(--border)}
.feature-icon{
  width:48px;height:48px;flex-shrink:0;
  background:var(--gold-pale);border:1px solid var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.feature-item .ft{font-size:.8rem;font-weight:500;color:var(--ink);margin-bottom:2px}
.feature-item .fs{font-size:.75rem;color:var(--ink2);line-height:1.6}
.cta-link{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;border:1px solid var(--gold);
  font-size:.75rem;font-weight:500;letter-spacing:.1em;color:var(--gold);
  border-radius:2px;transition:all .3s
}
.cta-link:hover{background:var(--gold);color:var(--white);box-shadow:0 4px 16px rgba(191,142,90,.3)}
.mat-panel-right .cta-link{display:block;width:fit-content;margin:32px auto 0;text-align:center}
@media(max-width:860px){.mat-panel-layout{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════════════
   CASES
══════════════════════════════════════════════════════ */
#cases{background:var(--bg2)}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:48px}
.filter-btn{
  padding:8px 20px;border:1px solid var(--border);
  font-size:.75rem;letter-spacing:.06em;color:var(--ink3);
  border-radius:2px;transition:all .3s
}
.filter-btn.active,.filter-btn:hover{background:var(--gold);color:var(--white);border-color:var(--gold)}
/* ═══ CASES — Cosentino-style full-bleed overlay ════════ */
.cases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--bg)}
.case-card{
  position:relative;overflow:hidden;cursor:pointer;
  aspect-ratio:3/4;background:var(--bg2);
}
.case-card:first-child,.case-card:nth-child(4){grid-column:span 2;aspect-ratio:16/9}
.case-card.hidden{display:none}

/* image fills entire card */
.case-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;
  transition:transform .9s cubic-bezier(.4,0,.2,1),filter .6s ease;
}
.case-card:hover .case-img{transform:scale(1.07)}
.case-img--premium{filter:brightness(1.04) contrast(1.07) saturate(1.1)}
.case-card:hover .case-img--premium{filter:brightness(.9) contrast(1.1) saturate(1.15)}

/* gradient vignette — always on, deepens on hover */
.case-card::before{
  content:'';position:absolute;inset:0;z-index:1;
  background:linear-gradient(
    to top,
    rgba(10,9,8,.97) 0%,
    rgba(10,9,8,.5)  40%,
    rgba(10,9,8,.08) 100%
  );
  opacity:.75;transition:opacity .6s ease;
}
.case-card:hover::before{opacity:1}

/* info: overlaid on image */
.case-info{
  position:absolute;bottom:0;left:0;right:0;
  padding:32px 28px 28px;z-index:2;
}

.case-tags{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.case-tag{
  font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;
  padding:3px 9px;background:rgba(191,142,90,.12);color:var(--gold);
  border:1px solid rgba(191,142,90,.3);border-radius:1px;
}

.case-title{
  font-family:var(--serif);font-size:1.05rem;font-weight:300;
  color:var(--white);line-height:1.35;margin-bottom:0;
  transition:margin-bottom .4s var(--ease);
}
.case-card:hover .case-title{margin-bottom:14px}

/* description — slides in on hover */
.case-body{
  font-size:.74rem;color:rgba(242,237,232,.62);
  line-height:1.8;font-weight:300;
  overflow:hidden;max-height:0;opacity:0;

/* meta row — fades up on hover */

@media(max-width:900px){

<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/split-type@0.3.4/umd/index.min.js"></script>

<body>
<div id="preloader"><div class="preloader-inner"><div class="preloader-logo">EUNSUNG</div><div class="preloader-line"></div></div></div>
<script>
/* ═══ 1. CORE UI — 외부 라이브러리 불필요 ══════════════════ */

/* NAV */
var _nav = document.getElementById('nav');
window.addEventListener('scroll', function() {
  _nav.classList.toggle('scrolled', window.scrollY > 60);
}, { passive: true });

/* HAMBURGER */
(function() {
  var h = document.getElementById('ham-btn');
  var m = document.getElementById('mobile-menu');
  var c = document.getElementById('close-menu');
  if (!h || !m) return;
  function close() { h.classList.remove('open'); m.classList.remove('open'); }
  h.addEventListener('click', function() { h.classList.toggle('open'); m.classList.toggle('open'); });
  if (c) c.addEventListener('click', close);
  m.querySelectorAll('.mob-link').forEach(function(l) { l.addEventListener('click', close); });
})();

/* HERO SLIDER + KEN BURNS */
(function() {
  var slides = document.querySelectorAll('.hero-slide');
  var dots   = document.querySelectorAll('.hero-dot');
  if (!slides.length) return;
  var cur = 0, timer;
  function resetKB(img) { if (!img) return; img.style.animation='none'; img.offsetHeight; img.style.animation=''; }
  function goSlide(n) {
    slides[cur].classList.remove('active'); dots[cur].classList.remove('active');
    cur = (n + slides.length) % slides.length;
    slides[cur].classList.add('active'); dots[cur].classList.add('active');
    resetKB(slides[cur].querySelector('img'));
  }
  function start() { timer = setInterval(function() { goSlide(cur + 1); }, 5000); }
  dots.forEach(function(d) { d.addEventListener('click', function() { clearInterval(timer); goSlide(+d.dataset.idx); start(); }); });
  start();
})();

/* TABS */
function openTab(id, scroll) {
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b)   { b.classList.remove('active'); });
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelector('[data-tab="' + id + '"]').classList.add('active');
  if (scroll) document.getElementById('materials-detail').scrollIntoView({ block: 'start' });
}

/* FAQ */
document.querySelectorAll('.faq-q').forEach(function(q) {
  q.addEventListener('click', function() {
    var item = q.parentElement;
    var isOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item').forEach(function(i) { i.classList.remove('open'); });
    if (!isOpen) item.classList.add('open');
  });
});

/* CASE FILTER */
document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    var f = btn.dataset.filter;
    document.querySelectorAll('.case-card').forEach(function(c) {
      c.classList.toggle('hidden', f !== 'all' && c.dataset.cat !== f);
    });
  });
});

/* FADE-UP (IntersectionObserver) */
var _io = new IntersectionObserver(function(entries) {
  entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.25 });
document.querySelectorAll('.fade-up').forEach(function(el) { _io.observe(el); });

/* COUNTER — fallback (순수 JS) */
function runCounter(el) {
  if (el.dataset.done) return; el.dataset.done = '1';
  var target = +el.dataset.to, step = target / 60, val = 0;
  var t = setInterval(function() {
    val = Math.min(val + step, target);
    el.textContent = Math.floor(val).toLocaleString();
    if (val >= target) clearInterval(t);
  }, 16);
}
var _cio = new IntersectionObserver(function(entries) {
  entries.forEach(function(e) {
    if (e.isIntersecting) document.querySelectorAll('.counter').forEach(runCounter);
  });
}, { threshold: 0.4 });
var trustSec = document.getElementById('trust');
if (trustSec) _cio.observe(trustSec);

/* ═══ 2. ENHANCED ANIMATIONS — window.load 후, 라이브러리 있을 때만 ═ */
window.addEventListener('load', function() {

  /* ── LENIS smooth scroll ── */
  var lenis = null;
  if (typeof Lenis !== 'undefined') {
    lenis = new Lenis({
      duration: 1.2,
      easing: function(t) { return Math.min(1, 1.001 - Math.pow(2, -10 * t)); },
      smoothWheel: true,
      wheelMultiplier: 0.8,
    });
    (function rafLoop(time) { lenis.raf(time); requestAnimationFrame(rafLoop); })(performance.now());
  }

  /* ── GSAP + ScrollTrigger ── */
  if (typeof gsap === 'undefined' || typeof ScrollTrigger === 'undefined') return;
  gsap.registerPlugin(ScrollTrigger);

  /* Lenis ↔ ScrollTrigger 동기화 */
  if (lenis) lenis.on('scroll', ScrollTrigger.update);

  /* NAV override (GSAP 방식) */
  ScrollTrigger.create({
    start: 'top -60', onUpdate: function(s) {
      _nav.classList.toggle('scrolled', s.scroll() > 60);
    }
  });

  /* ── Hero text entrance (SplitType) ── */
  if (typeof SplitType !== 'undefined') {
    var ht = document.querySelector('.hero-title');
    if (ht) {
      var sp = new SplitType(ht, { types: 'words' });
      gsap.from(sp.words, { opacity: 0, y: 28, duration: 0.9, stagger: 0.07, ease: 'power3.out', delay: 0.3 });
    }
  }
  gsap.from('.hero-label',   { opacity: 0, y: 14, duration: 0.6, delay: 0.1, ease: 'power2.out' });
  gsap.from('.hero-sub',     { opacity: 0, y: 14, duration: 0.6, delay: 0.6, ease: 'power2.out' });
  gsap.from('.hero-actions', { opacity: 0, y: 14, duration: 0.6, delay: 0.8, ease: 'power2.out' });

  /* ── About image parallax ── */
  gsap.to('.about-img-main', {
    yPercent: -12, ease: 'none',
    scrollTrigger: { trigger: '#about', start: 'top bottom', end: 'bottom top', scrub: true }
  });

  /* ── Stagger scroll reveals ── */
  [
    ['.trust-item',    '#trust',        'top 90%', 0.10],
    ['.partner-item',  '#partners',     'top 90%', 0.08],
    ['.mat-card',      '.mat-grid',     'top 80%', 0.10],
    ['.process-step',  '.process-grid', 'top 80%', 0.12],
    ['.case-card',     '.cases-grid',   'top 80%', 0.08],
    ['.b2b-stat',      '.b2b-stats',    'top 80%', 0.10],
    ['.compare-table tr', '.compare-table', 'top 85%', 0.05],
  ].forEach(function(c) {
    gsap.from(c[0], {
      opacity: 0, y: 36, stagger: c[3], duration: 0.7, ease: 'power3.out',
      scrollTrigger: { trigger: c[1], start: c[2], once: true }
    });
  });

  /* ── Counter upgrade (GSAP) — fallback 덮어쓰기 ── */
  ScrollTrigger.create({
    trigger: '#trust', start: 'top 85%', once: true,
    onEnter: function() {
      document.querySelectorAll('.counter').forEach(function(el) {
        if (el.dataset.done) return; el.dataset.done = '1';
        var obj = { val: 0 }, target = +el.dataset.to;
        gsap.to(obj, {
          val: target, duration: 2.2, ease: 'power2.out',
          onUpdate: function() { el.textContent = Math.floor(obj.val).toLocaleString(); },
          onComplete: function() { el.textContent = target.toLocaleString(); }
        });
      });
    }
  });

  /* ── VanillaTilt on mat cards ── */
  if (typeof VanillaTilt !== 'undefined') {
    VanillaTilt.init(document.querySelectorAll('.mat-card'), {
      max: 5, speed: 400, glare: true, 'max-glare': 0.12, perspective: 1200
    });
  }

  /* ── ScrollTrigger refresh (이미지 로드 후 높이 재계산) ── */
  ScrollTrigger.refresh();
});
</script>
</body>
</html>
